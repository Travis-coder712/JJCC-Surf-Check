<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>QR Code</title>
<style>
  body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; background:#0b1d3a; color:#fff; font-family:system-ui; }
  h2 { margin-bottom:8px; }
  p { opacity:0.7; margin-bottom:24px; font-size:0.95rem; }
  #qr { background:#fff; padding:16px; border-radius:12px; }
  .url { margin-top:16px; font-size:1.1rem; font-weight:600; color:#00b4d8; }
</style>
</head><body>
<h2>🌊 Scan to open JJCC Surf Check</h2>
<p>Make sure your phone is on the same WiFi network</p>
<div id="qr"></div>
<div class="url">http://192.168.0.30:3456</div>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script>
var qr = qrcode(0, "M");
qr.addData("http://192.168.0.30:3456");
qr.make();
document.getElementById("qr").innerHTML = qr.createSvgTag(6, 0);
</script>
</body></html>
